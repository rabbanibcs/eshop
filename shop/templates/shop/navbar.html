{% load static %}
{% load filters %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                 <a class="nav-link" href="{% url 'shop' %}">SHOP <span class="sr-only">(current)</span></a>
                </li>
                <li>
                    <form class="form-inline " method="get">
                        <input name="query" class="form-control mr-sm-2" type="text" placeholder="Search product here" aria-label="Search">
                        <button class="btn btn-info my-2 my-sm-0" type="submit">Search</button>
                    </form>
                </li>
            </ul>

            <div class="form-inline my-2 my-lg-0">
                    <a href="{% url 'cart' %}">
                        <img  id="cart-icon" src="{% static 'cart.png' %}">
                    </a>
                    <p id="cart-total">{{request.session.cart|total_cart_items|default:0}}</p>
            </div>
      </div>
</nav>
